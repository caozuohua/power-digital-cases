name: Weekly Data Update

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一 UTC 01:00 (= 北京时间 09:00)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run validation
        run: python3 scripts/cases_automation.py --validate

      - name: Generate report
        run: python3 scripts/cases_automation.py --report

      - name: Check for candidates
        id: check
        run: |
          if [ -f data/candidates.json ]; then
            count=$(python3 -c "import json; c=json.load(open('data/candidates.json')); print(len(c))")
            echo "count=$count" >> $GITHUB_OUTPUT
            if [ "$count" -gt 0 ]; then
              echo "has_candidates=true" >> $GITHUB_OUTPUT
            else
              echo "has_candidates=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_candidates=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Validate candidates
        if: steps.check.outputs.has_candidates == 'true'
        run: |
          python3 -c "
          import json
          from scripts.cases_automation import validate_candidates, load_existing
          candidates = json.load(open('data/candidates.json'))
          existing = load_existing()
          results = validate_candidates(candidates, existing)
          with open('data/validation_result.json', 'w') as f:
              json.dump({
                  'valid_count': len(results['valid']),
                  'invalid_count': len(results['invalid']),
                  'duplicate_count': len(results['duplicates']),
              }, f, ensure_ascii=False)
          print(f'Valid: {len(results[\"valid\"])}, Invalid: {len(results[\"invalid\"])}, Duplicate: {len(results[\"duplicates\"])}')
          "

      - name: Create Pull Request
        if: steps.check.outputs.has_candidates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/data-update-${{ github.run_number }}
          title: "auto: 数据更新 (${{ steps.check.outputs.count }} 条候选)"
          body: |
            ## 自动数据更新
            
            本周数据采集结果：
            - 候选案例数：${{ steps.check.outputs.count }}
            
            请查看 `data/candidates.json` 和 `reports/` 目录下的详细报告。
            
            ### 审核清单
            - [ ] 检查候选案例来源可靠性
            - [ ] 确认无重复数据
            - [ ] 验证字段完整性
            - [ ] 合入后确认页面正常显示
            
            ---
            *Auto-generated by GitHub Actions*
          labels: |
            data-update
            automated
            review-needed
          reviewers: caozuohua99

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
