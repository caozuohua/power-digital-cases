<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球电力行业数字化项目案例集</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="container">
    <h1>⚡ 全球电力行业数字化项目案例集</h1>
    <p class="subtitle">Power Industry Digital Transformation Case Studies</p>
  </div>
</header>

<section class="search-section">
  <div class="container">
    <input type="text" id="search-input" placeholder="搜索案例名称、企业、技术、国家..." autocomplete="off">
    <div class="stats" id="stats"></div>
  </div>
</section>

<section class="filters-section">
  <div class="container">
    <div class="filter-group">
      <label>国家/地区：</label>
      <select id="filter-country"><option value="">全部</option></select>
    </div>
    <div class="filter-group">
      <label>规模：</label>
      <select id="filter-scale"><option value="">全部</option></select>
    </div>
    <div class="filter-group">
      <label>年份：</label>
      <select id="filter-year"><option value="">全部</option></select>
    </div>
    <button id="btn-reset" class="btn-reset">重置筛选</button>
  </div>
</section>

<section class="tags-section">
  <div class="container">
    <div id="tag-cloud" class="tag-cloud"></div>
  </div>
</section>

<main class="container">
  <div id="case-list" class="case-grid"></div>
  <div id="no-result" class="no-result" style="display:none">
    <p>😕 没有找到匹配的案例，试试调整筛选条件？</p>
  </div>
</main>

<footer>
  <div class="container">
    <p>数据源：公开资料整理 | 持续更新中</p>
    <p id="total-count"></p>
  </div>
</footer>

<!-- 详情弹窗 -->
<div id="modal" class="modal" style="display:none">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <button class="modal-close" id="modal-close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
